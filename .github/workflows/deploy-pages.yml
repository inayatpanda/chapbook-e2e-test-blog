name: Deploy to GitHub Pages
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency: { group: pages, cancel-in-progress: true }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      # Decide the base path: a custom domain (CNAME present at the repo root or in
      # public/) serves the site at "/"; otherwise it's a GitHub Pages project site
      # under "/<repo>/". $GITHUB_REPOSITORY is "owner/repo" on every trigger.
      - name: Resolve BASE_PATH
        run: |
          if [ -f CNAME ] || [ -f public/CNAME ]; then
            echo "Custom domain detected (CNAME) — serving at /"
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/${GITHUB_REPOSITORY##*/}/" >> "$GITHUB_ENV"
          fi
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: ./dist }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: "${{ steps.deployment.outputs.page_url }}" }
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
